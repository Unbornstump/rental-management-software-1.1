<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Login</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-error" id="login-error"></div>

      <div id="setup-flow" class="setup-flow" hidden></div>

      <div id="auth-view">
        <h1 class="login-title">RMS</h1>
        <h2 class="login-subtitle">Rental Management System</h2>
        
        <div class="login-divider"></div>
        
        <form id="login-form" class="login-form">
          <div class="form-group">
            <input 
              type="text" 
              id="username" 
              class="login-input" 
              placeholder="Username" 
              required
            >
            <span class="field-error" id="username-error"></span>
          </div>
          
          <div class="form-group">
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="password" 
                class="login-input" 
                placeholder="Password" 
                required
              >
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                <svg class="eye-icon eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-icon eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="password-error"></span>
          </div>
          
          <button type="submit" class="login-button">Log In</button>
        </form>
        
        <a href="#" class="forgot-password" id="forgot-password-link">Forgot password?</a>
      </div>
      <div id="recovery-form-container" class="recovery-form-container" hidden></div>
    </div>
  </div>

  <div id="password-change-screen" class="password-change-screen" hidden>
    <div class="password-change-card" role="dialog" aria-modal="true" aria-labelledby="password-change-title">
      <h2 id="password-change-title">Set New Password</h2>
      <p id="password-change-welcome" class="password-change-welcome"></p>
      <p class="password-change-subtitle">You must set a new password before continuing.</p>

      <form id="password-change-form" class="password-change-form">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="modal-input" placeholder="Enter new password" required>
          <span class="field-error" id="new-password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="modal-input" placeholder="Confirm new password" required>
          <span class="field-error" id="confirm-password-error"></span>
        </div>

        <button type="submit" class="modal-button">Set Password & Continue</button>
      </form>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script src="state.js"></script>
  <script src="login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Login</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">RMS</h1>
      <h2 class="login-subtitle">Rental Management System</h2>
      
      <div class="login-divider"></div>
      
      <form id="login-form" class="login-form">
        <div class="form-group">
          <input 
            type="text" 
            id="username" 
            class="login-input" 
            placeholder="Username" 
            required
          >
          <span class="field-error" id="username-error"></span>
        </div>
        
        <div class="form-group">
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="password" 
              class="login-input" 
              placeholder="Password" 
              required
            >
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              👁
            </button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>
        
        <button type="submit" class="login-button">Log In</button>

        <div class="login-error" id="login-error"></div>
      </form>
      
      <a href="#" class="forgot-password">Forgot password?</a>
    </div>
  </div>
  <script src="api-client.js"></script>
  <script src="login.js"></script>
</body>
</html>

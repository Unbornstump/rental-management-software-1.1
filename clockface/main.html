<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Dashboard</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="main-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Navigation</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-button active" data-page="dashboard">
          <span class="nav-icon">🏠</span>
          Dashboard
        </button>
        <button class="nav-button" data-page="properties">
          <span class="nav-icon">🏢</span>
          Properties
        </button>
        <div class="property-nav-items" id="property-nav-items" style="display: none;">
          <button class="nav-button" data-page="units">
            <span class="nav-icon">🚪</span>
            Units
          </button>
          <button class="nav-button" data-page="landlords">
            <span class="nav-icon">👤</span>
            Landlords
          </button>
          <button class="nav-button" data-page="tenants">
            <span class="nav-icon">👥</span>
            Tenants
          </button>
          <button class="nav-button" data-page="leases">
            <span class="nav-icon">📄</span>
            Leases
          </button>
          <button class="nav-button" data-page="financials">
            <span class="nav-icon">💰</span>
            Financials
          </button>
          <button class="nav-button" data-page="maintenance">
            <span class="nav-icon">🛠</span>
            Maintenance
          </button>
          <button class="nav-button" data-page="reports">
            <span class="nav-icon">📊</span>
            Reports
          </button>
        </div>
      </nav>
    </aside>
    <main class="content-area">
      <div id="page-content"></div>
    </main>
  </div>
  <script src="api-client.js"></script>
  <script src="state.js"></script>
  <script src="modals.js"></script>
  <script src="pages.js"></script>
  <script src="renderer.js"></script>
</body>
</html>

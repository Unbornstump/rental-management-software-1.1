<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Dashboard</title>
  <script>
    (function () {
      const storageKey = 'theme';
      function isValidTheme(theme) {
        return theme === 'light' || theme === 'dark' || theme === 'system';
      }
      function getStoredTheme() {
        try {
          const storedTheme = localStorage.getItem(storageKey);
          return isValidTheme(storedTheme) ? storedTheme : 'dark';
        } catch (error) {
          return 'dark';
        }
      }
      function resolveTheme(theme) {
        if (theme !== 'system') return theme;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      const theme = getStoredTheme();
      const resolvedTheme = resolveTheme(theme);
      const root = document.documentElement;
      const bg = resolvedTheme === 'dark' ? '#0f1115' : '#fafafa';
      const text = resolvedTheme === 'dark' ? '#f5f7fa' : '#1a1a1a';
      root.setAttribute('data-theme', resolvedTheme);
      root.setAttribute('data-theme-preference', theme);
      root.style.colorScheme = resolvedTheme;
      root.style.backgroundColor = bg;
      root.style.color = text;
      root.classList.toggle('theme-dark', resolvedTheme === 'dark');
      root.classList.toggle('theme-light', resolvedTheme === 'light');
      document.body && Object.assign(document.body.style, { backgroundColor: bg, color: text });
    })();
  </script>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="loading.css">
</head>
<body>
  <div id="workspace-loading-overlay">
    <div class="loading-content">
      <h1 class="loading-title">RMS</h1>
      <p class="loading-subtitle">Loading your workspace...</p>
      <div class="progress-container">
        <div class="progress-row">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-bar"></div>
          </div>
          <span class="progress-percentage" id="progress-percentage">0%</span>
        </div>
        <p class="progress-stage" id="progress-stage">Initializing...</p>
      </div>
    </div>
    <div class="error-state">
      <div class="error-icon">✕</div>
      <h2 class="error-title">Could not load your workspace</h2>
      <p class="error-message">Please try again.</p>
      <div class="error-actions">
        <button class="action-button" id="loading-retry-btn">Retry</button>
        <button class="cancel-btn" id="loading-logout-btn">Log Out</button>
      </div>
    </div>
  </div>
  <div class="main-container no-sidebar">
    <!-- Control Center Header -->
    <header class="control-center-header">
      <button class="dynamic-island-nav" id="control-center-btn" aria-label="Open Control Center">
        <div class="hamburger-icon">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </div>
        <div class="close-icon">
          <span class="close-line"></span>
          <span class="close-line"></span>
        </div>
      </button>
    </header>

    <!-- Control Center Overlay -->
    <div class="control-center-overlay" id="control-center-overlay" aria-hidden="true">
      <div class="control-center-backdrop" id="control-center-backdrop"></div>
      <div class="control-center-panel">
        <div class="control-center-content">
          <h2 class="control-center-title">Control Center</h2>
          <div class="control-center-workspaces">
            <button class="workspace-card administration-card" id="administration-card-btn">
              <div class="workspace-card-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M24 4L6 12V24C6 33.94 13.94 42.92 24 46C34.06 42.92 42 33.94 42 24V12L24 4Z" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M24 14V34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M14 24H34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="workspace-card-title">Administration</div>
              <div class="workspace-card-description">Manage users, roles, permissions and system access</div>
              <div class="workspace-card-stats">
                <div class="workspace-stat">
                  <span class="workspace-stat-value" data-stat="users">--</span>
                  <span class="workspace-stat-label">Users</span>
                </div>
                <div class="workspace-stat">
                  <span class="workspace-stat-value" data-stat="roles">--</span>
                  <span class="workspace-stat-label">Roles</span>
                </div>
                <div class="workspace-stat">
                  <span class="workspace-stat-value" data-stat="permissions">--</span>
                  <span class="workspace-stat-label">Groups</span>
                </div>
              </div>
              <div class="workspace-card-footer">
                <span class="workspace-card-action">Manage</span>
                <svg class="workspace-card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>
            <button class="workspace-card financial-hub-card" id="financial-hub-card-btn">
              <div class="workspace-card-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="8" y="8" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M16 20H32M16 28H28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="32" cy="32" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M32 29V35M29 32H35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="workspace-card-title">Financial Hub</div>
              <div class="workspace-card-description">Track revenue, rent payments, balances and financial reports</div>
              <div class="workspace-card-stats">
                <div class="workspace-stat">
                  <span class="workspace-stat-value" data-stat="collection-rate">--</span>
                  <span class="workspace-stat-label">Collection Rate</span>
                </div>
                <div class="workspace-stat">
                  <span class="workspace-stat-value" data-stat="net-to-owners">--</span>
                  <span class="workspace-stat-label">Net to Owners</span>
                </div>
              </div>
              <div class="workspace-card-footer">
                <span class="workspace-card-action" style="font-size: 0.8rem; color: var(--text-muted);" data-stat="last-updated">--</span>
                <svg class="workspace-card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>

    <aside class="sidebar" aria-hidden="true">
      <nav class="sidebar-nav">
        <!-- Property Space Navigation -->
        <div id="property-space-nav" style="display: none;">
          <div class="property-space-nav-main">
            <div class="property-context-header">
              <div class="property-context-info">
                <div class="property-context-name" id="property-context-name">Property Name</div>
                <div class="property-context-label" id="property-context-type">Property type</div>
              </div>
            </div>
            <div class="nav-divider"></div>

            <div class="nav-section">
              <div class="nav-section-title">Main</div>
              <button class="nav-button active" data-page="property-dashboard">
                Dashboard
              </button>
              <button class="nav-button" data-page="property-units">
                Units
              </button>
              <button class="nav-button" data-page="property-tenants">
                Tenants
              </button>
              <button class="nav-button" data-page="financials">
                Financials
              </button>

            </div>

            
          </div>
          <div class="nav-divider"></div>
          <button class="nav-button back-to-properties-btn" data-action="back-to-properties">
            ← Back to Properties
          </button>
        </div>
      </nav>
    </aside>
    <main class="content-area">
      <div id="page-content"></div>
    </main>
  </div>
  <script src="theme.js"></script>
  <script src="api-client.js"></script>
  <script src="state.js"></script>
  <script src="modals.js"></script>
  <script src="shared-components.js"></script>
  <script src="empty-state-illustrations.js"></script>
  <script src="control-center.js"></script>
  <script src="property-pages.js"></script>
  <script src="units-pages.js"></script>
  <script src="tenants-pages.js"></script>
  <script src="financials-pages.js"></script>
  <script src="treasury-pages.js"></script>
  <script src="admin-pages.js"></script>
  <script src="pages.js"></script>
  <script src="workspace-loading.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
